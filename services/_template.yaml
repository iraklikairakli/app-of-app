# =============================================================================
# Service Template
# =============================================================================
# To onboard a new service:
#   1. mkdir services/<your-service-name>
#   2. cp services/_template.yaml services/<your-service-name>/base.yaml
#   3. Edit base.yaml with your service config
#   4. (Optional) Create dev.yaml, stage.yaml, prod.yaml for env overrides
#   5. Commit and push — ArgoCD auto-discovers the new service
# =============================================================================

image:
  repository: registry.example.com/<your-service-name>
  tag: "latest"


# =============================================================================
# Service Template — Default Values
# =============================================================================
# These defaults apply to ALL services unless overridden in:
#   services/<name>/base.yaml    (shared overrides)
#   services/<name>/<env>.yaml   (environment-specific overrides)
# =============================================================================

replicaCount: 1

image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: regcred

nameOverride: ""
fullnameOverride: ""
extraLabels: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  name: ""
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

httpRoute:
  enabled: false
  parentRefs:
    - name: eg
      namespace: envoy
  hostnames: []
  rules:
    - backendPort: 8080
      pathMatch: ""

configMap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

env: []

extraPorts: []

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 6
  targetCPU: 80
  targetMemory: ""

resources: {}

deploymentStrategy:
  type: "RollingUpdate"
  rollingUpdate:
    maxSurge: "25%"
    maxUnavailable: "25%"

# Direct probe objects (takes precedence over probes.* if set)
livenessProbe: {}
readinessProbe: {}

# Structured probe config (used as fallback when livenessProbe/readinessProbe are empty)
probes:
  liveness:
    enabled: true
    path: /actuator/health/liveness
    port: http
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    enabled: true
    path: /actuator/health/readiness
    port: http
    initialDelaySeconds: 15
    periodSeconds: 15

serviceMonitor:
  enabled: false
  path: /actuator/prometheus
  interval: 10s

lifecycle: {}

initContainers: []
volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

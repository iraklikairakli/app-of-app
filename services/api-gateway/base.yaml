# API Gateway — shared config (all environments)
image:
  repository: registry.example.com/api-gateway

service:
  port: 8080
  targetPort: 8080

httpRoute:
  enabled: true
  hostnames:
    - "api.example.com"
  rules:
    - backendPort: 8080
      pathMatch: /api

configMap:
  enabled: true
  data:
    LOG_LEVEL: "info"

# Secrets managed via External Secrets Operator — do NOT put values here
secret:
  enabled: true

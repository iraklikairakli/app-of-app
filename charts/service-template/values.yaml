replicaCount: 1

image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80
  targetPort: 80

httpRoute:
  enabled: false
  parentRefs:
    - name: eg
      namespace: envoy
  hostnames: []
  rules:
    - backendPort: 80
      pathMatch: ""

configMap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPU: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    enabled: true
    path: /healthz
    port: http
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    enabled: true
    path: /ready
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

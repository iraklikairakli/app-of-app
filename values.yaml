# =============================================================================
# Global ArgoCD Settings
# =============================================================================
argocd:
  namespace: argocd
  project: default
  repoURL: "https://github.com/iraklikairakli/app-of-app.git"

# =============================================================================
# Environments / Clusters
# =============================================================================
# Each entry generates an ApplicationSet that discovers services from services/
# and deploys them to the target cluster.
#
# To add a new environment or cluster:
#   1. Add an entry here
#   2. Create environments/<name>.yaml with cluster-specific defaults
#   3. (Optional) Add services/<service>/<env>.yaml for per-service overrides
# =============================================================================
environments:
  dev:
    enabled: true
    server: "https://kubernetes.default.svc
    namespace: dev
    labels:
      environment: dev
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

  stage:
    enabled: true
    server: "https://stage.k8s.example.com"
    namespace: stage
    labels:
      environment: stage
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

  prod-cluster-1:
    enabled: true
    server: "https://prod-1.k8s.example.com"
    namespace: production
    envKey: prod            # maps to services/<svc>/prod.yaml
    labels:
      environment: prod
      cluster: prod-1
      region: us-east-1
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

  prod-cluster-2:
    enabled: true
    server: "https://prod-2.k8s.example.com"
    namespace: production
    envKey: prod            # shares prod.yaml overrides with cluster-1
    labels:
      environment: prod
      cluster: prod-2
      region: eu-west-1
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

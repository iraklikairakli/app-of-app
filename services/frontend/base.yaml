# Frontend — shared config (all environments)
image:
  repository: registry.example.com/frontend
  tag: "v1.2.0"

service:
  port: 80
  targetPort: 3000

httpRoute:
  enabled: true
  hostnames:
    - "frontend.example.com"
  rules:
    - backendPort: 80

configMap:
  enabled: true
  data:
    NODE_ENV: "production"

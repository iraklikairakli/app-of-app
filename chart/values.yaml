# =============================================================================
# Service Template — Default Values
# =============================================================================
# These defaults apply to ALL services unless overridden in:
#   services/<name>/base.yaml    (shared overrides)
#   services/<name>/<env>.yaml   (environment-specific overrides)
# =============================================================================

replicaCount: 2

image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

httpRoute:
  enabled: false
  parentRefs:
    - name: eg
      namespace: envoy
  hostnames: []
  rules:
    - backendPort: 8080
      pathMatch: ""

configMap:
  enabled: false
  data: {}

secret:
  enabled: false
  # NOTE: Do NOT store secret values in Git.
  # Use External Secrets Operator, Sealed Secrets, or Vault.
  # This chart only creates the Secret resource skeleton.
  data: {}

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 75

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    enabled: true
    path: /healthz
    port: http
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    enabled: true
    path: /ready
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

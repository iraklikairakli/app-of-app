replicaCount: 2

image:
  repository: registry.example.com/placeholder
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 75

httpRoute:
  enabled: false
  parentRefs:
    - name: eg
      namespace: envoy

configMap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

probes:
  liveness:
    enabled: true
    path: /healthz
    port: http
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    enabled: true
    path: /ready
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: app-of-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/iraklikairakli/app-of-app.git
        revision: HEAD
        directories:
          - path: "services/*"

  template:
    metadata:
      name: "{{path.basename}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: app-of-apps
        app.kubernetes.io/component: "{{path.basename}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: production
      source:
        repoURL: https://github.com/iraklikairakli/app-of-app.git
        targetRevision: HEAD
        path: chart
        helm:
          valueFiles:
            - ../defaults.yaml
            - "../{{path}}/values.yaml"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

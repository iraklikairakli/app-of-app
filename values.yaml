# =============================================================================
# Global ArgoCD Settings
# =============================================================================
argocd:
  namespace: argocd
  project: integrations
  repoURL: "https://github.com/iraklikairakli/app-of-app.git"

# =============================================================================
# Environments / Clusters
# =============================================================================
# Each entry generates an ApplicationSet that discovers services from services/
# and deploys them to the target cluster.
#
# To add a new environment or cluster:
#   1. Add an entry here
#   2. Create environments/<name>.yaml with cluster-specific defaults
#   3. (Optional) Add services/<service>/<env>.yaml for per-service overrides
# =============================================================================
environments:
  dev:
    enabled: true
    server: "https://10.4.12.100:6443"
    namespace: default
    labels:
      environment: dev
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

  qa:
    enabled: true
    server: "https://10.4.12.100:6443"
    namespace: default
    labels:
      environment: qa
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

  stage:
    enabled: true
    server: "https://10.4.12.100:6443"
    namespace: default
    labels:
      environment: stage
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

  prod-c9:
    enabled: true
    server: "https://10.4.12.100:6443"
    namespace: default
    envKey: prod
    labels:
      environment: prod
      cluster: c9
    syncPolicy:
      automated:
        prune: false
        selfHeal: false
      syncOptions:
        - CreateNamespace=true

  prod-co:
    enabled: true
    server: "https://10.4.12.200:6443"
    namespace: default
    envKey: prod
    labels:
      environment: prod
      cluster: co
    syncPolicy:
      automated:
        prune: false
        selfHeal: false
      syncOptions:
        - CreateNamespace=true

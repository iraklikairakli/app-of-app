# =============================================================================
# Service Template
# =============================================================================
# To onboard a new service:
#   1. mkdir services/<your-service-name>
#   2. cp services/_template.yaml services/<your-service-name>/base.yaml
#   3. Edit base.yaml — set image, ports, ingress
#   4. Create dev.yaml, qa.yaml, stage.yaml, prod.yaml for env-specific overrides
#   5. Commit and push — ArgoCD auto-discovers the new service
# =============================================================================

image:
  repository: crocohub/<your-service-name>
  tag: "latest"

service:
  name: <your-service-name>-service
  port: 8080
  targetPort: 8080


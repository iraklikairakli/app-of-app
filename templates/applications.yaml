{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    app.kubernetes.io/part-of: app-of-apps
    app.kubernetes.io/component: {{ $name }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $svc.namespace | default "default" }}
  source:
    repoURL: {{ $.Values.argocd.repoURL }}
    chart: {{ $svc.chart }}
    targetRevision: {{ $svc.targetRevision }}
    helm:
      valuesObject:
        {{- $svc.values | toYaml | nindent 8 }}
  syncPolicy:
    {{- $.Values.argocd.syncPolicy | toYaml | nindent 4 }}
{{- end }}
{{- end }}
